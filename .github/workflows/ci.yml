# This is a basic workflow to help you get started with Actions

name: CI
env:
  NODE_OPTIONS: "--max_old_space_size=4096"

# Controls when the action will run.
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id  }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - run: npm install -g yarn@^1.22.22 && yarn install

      - name: Check formatting with prettier
        run: yarn prettier-check

      # Root README.md mirrors packages/terriajs/README.md (interim parity: same
      # content on the GitHub repo page and the npm terriajs page). Fail if the mirror
      # is stale — run `yarn sync-readme` after editing the package README.
      - name: Check README parity
        run: yarn sync-readme && git diff --exit-code -- README.md

      - name: Build TerriaJS tests
        run: yarn workspace terriajs gulp lint build --continue
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Check i18n types are up to date
        run: git diff --exit-code -- packages/terriajs/lib/ThirdParty/i18n/resources.d.ts

      - name: Run tests using xvfb
        uses: GabrielBB/xvfb-action@v1
        with:
          run: yarn workspace terriajs gulp test-firefox
