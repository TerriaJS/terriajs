name: Notify saas-settings on merge

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - notify-workflow

jobs:
  dispatch:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SAAS_SETTINGS_APP_CLIENT_ID }}
          private-key: ${{ secrets.SAAS_SETTINGS_APP_PRIVATE_KEY }}
          repositories: saas-settings

      - name: Trigger repository_dispatch on saas-settings
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: 'saas-settings',
              event_type: 'terriajs-oss-updated',
              client_payload: {
                ref: context.ref,
                sha: context.sha,
                repository: context.repo.repo,
                actor: context.actor,
              },
            });
