# Lives at the repo root so Netlify picks it up. `base` points the build at the
# terriajs package; `command` and `publish` are resolved relative to `base`.
[build]
  base = "packages/terriajs"
  command = "yarn gulp docs"
  publish = "wwwroot/doc"
[build.environment]
  NODE_VERSION = "22"
  NODE_OPTIONS = "--max_old_space_size=4096"
  NETLIFY_USE_YARN = "true"
  PYTHON_VERSION = "3.13"
